# Nixpacks configuration for Railway deployment
# MTS Angola Multi-Agent System

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]
aptPkgs = ["openssl"]

[phases.install]
cmds = ["npm ci --include=dev"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npm run build"
]

[start]
cmd = "node server.js"
